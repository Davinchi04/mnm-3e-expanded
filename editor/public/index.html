<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M&M 3e Pack Editor</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="sidebar">
    <h1>Packs</h1>
    <div id="pack-list"></div>
  </aside>

  <div id="list-panel">
    <div id="list-header">
      <input id="search" type="search" placeholder="Search...">
      <button id="btn-new">+ New</button>
    </div>
    <div id="list-empty" style="display:none">Select a pack</div>
    <ul id="entry-list"></ul>
  </div>

  <div id="edit-panel">
    <p id="edit-placeholder">Select an entry to edit</p>
    <div id="edit-form" style="display:none">
      <h2 id="edit-title"></h2>

      <!-- Main Content Fields -->
      <!-- (Empty at top now) -->

      <!-- Common Fields -->
      <div class="section-divider">Metadata</div>
      <div class="field-row-group">
        <div class="field">
          <label for="f-name">Name</label>
          <input id="f-name" type="text">
        </div>
        <div class="field power-only">
          <label for="f-p-type">Effect Type</label>
          <select id="f-p-type">
            <option value="">(None)</option>
            <option value="attack">Attack</option>
            <option value="control">Control</option>
            <option value="defense">Defense</option>
            <option value="general">General</option>
            <option value="movement">Movement</option>
            <option value="sensory">Sensory</option>
          </select>
        </div>
      </div>

      <!-- Power Fields -->
      <div class="power-only" style="display:none">
        <div class="section-divider">Power Details</div>
        <div class="field-row-group">
          <div class="field">
            <label for="f-p-rank">Rank</label>
            <input id="f-p-rank" type="number" min="0">
          </div>
          <div class="field">
            <label for="f-p-cost">Cost per Rank</label>
            <input id="f-p-cost" type="number" min="0">
          </div>
          <div class="field">
            <label for="f-p-special">Special</label>
            <select id="f-p-special">
              <option value="standard">Standard</option>
              <option value="movement">Movement</option>
            </select>
          </div>
        </div>
        <div class="field-row-group">
          <div class="field">
            <label for="f-p-action">Action</label>
            <select id="f-p-action">
              <option value="simple">Standard (Simple)</option>
              <option value="move">Move</option>
              <option value="free">Free</option>
              <option value="reaction">Reaction</option>
              <option value="none">None</option>
            </select>
          </div>
          <div class="field">
            <label for="f-p-range">Range</label>
            <select id="f-p-range">
              <option value="personal">Personal</option>
              <option value="close">Close</option>
              <option value="distance">Ranged (Distance)</option>
              <option value="perception">Perception</option>
              <option value="rank">Rank</option>
            </select>
          </div>
          <div class="field">
            <label for="f-p-duration">Duration</label>
            <select id="f-p-duration">
              <option value="instantane">Instant (Instantané)</option>
              <option value="sustained">Sustained</option>
              <option value="continuous">Continuous</option>
              <option value="permanent">Permanent</option>
              <option value="concentration">Concentration</option>
            </select>
          </div>
        </div>
        <div class="field-row-group">
          <div class="field field-row">
            <label>
              <input id="f-p-activate" type="checkbox">
              Activate
            </label>
          </div>
        </div>
        <div class="field">
          <label for="f-p-effets-principaux">Subtitle</label>
          <textarea id="f-p-effets-principaux" rows="2"></textarea>
        </div>
        <div class="field">
          <label id="desc-label">Description - Mechanics (Top Sheet Area & Tab)</label>
          <div id="f-description"></div>
        </div>
        <div class="field">
          <label for="f-p-mechanics">Details - Flavor (Bottom Sheet Area)</label>
          <div id="f-p-mechanics"></div>
        </div>
        <div class="field">
          <label for="f-p-notes">Notes - Undisplayed</label>
          <div id="f-p-notes"></div>
        </div>

        <div class="section-divider">Modifiers (Extras & Flaws)</div>
        <div class="modifiers-container">
          <div class="modifier-column">
            <h3>Extras</h3>
            <ul id="extras-list" class="item-tag-list"></ul>
            <div class="add-modifier">
              <select id="add-extra-select">
                <option value="">+ Add Extra...</option>
              </select>
            </div>
          </div>
          <div class="modifier-column">
            <h3>Flaws</h3>
            <ul id="flaws-list" class="item-tag-list"></ul>
            <div class="add-modifier">
              <select id="add-flaw-select">
                <option value="">+ Add Flaw...</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Common Description (Hidden for Powers since it's now inside power-only) -->
      <div class="eq-only modifier-only json-only" style="display:none">
        <div class="field">
          <label id="desc-label-common">Description - Mechanics</label>
          <div id="f-description-common"></div>
        </div>
      </div>

      <!-- Equipment Fields -->
      <div class="eq-only" style="display:none">
        <div class="section-divider">Equipment Stats</div>
        <div class="field-row-group">
          <div class="field">
            <label for="f-e-cost">Cost (EP)</label>
            <input id="f-e-cost" type="number" min="0">
          </div>
          <div class="field">
            <label for="f-e-protection">Protection</label>
            <input id="f-e-protection" type="number" min="0">
          </div>
          <div class="field">
            <label for="f-e-group">Array Group / Link</label>
            <input id="f-e-group" type="text">
          </div>
        </div>
      </div>

      <!-- Modifier (Extras/Flaws) Fields -->
      <div class="modifier-only" style="display:none">
        <div class="section-divider">Modifier Cost</div>
        <div class="field field-inline">
          <div>
            <label for="f-cout-value">Value</label>
            <input id="f-cout-value" type="number">
          </div>
          <div class="field field-row">
            <label>
              <input id="f-cout-fixe" type="checkbox">
              Flat (Fixe)
            </label>
          </div>
          <div class="field field-row">
            <label>
              <input id="f-cout-rang" type="checkbox">
              Per Rank (Rang)
            </label>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="btn-save">Save Changes</button>
        <button id="btn-delete">Delete Entry</button>
        <span class="save-status" id="save-status">Saved Successfully</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
