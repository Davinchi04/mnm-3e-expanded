<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M&M Compendium Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">M&M Card Editor</h1>
    <select id="compendiumSelect" class="p-2 mb-4 w-full">
      <option value="powers">Powers</option>
      <option value="advantages">Advantages</option>
      <option value="flaws">Flaws</option>
      <option value="extras">Extras</option>
    </select>
    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <!-- Editor Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg w-full max-w-lg">
      <h2 id="modalTitle" class="text-xl font-bold mb-4">Edit Card</h2>
      <label>Description:</label>
      <textarea id="editDesc" class="w-full border p-2 mb-4 h-32"></textarea>
      <label>Mechanics:</label>
      <textarea id="editMech" class="w-full border p-2 mb-4 h-20"></textarea>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="bg-gray-300 px-4 py-2 rounded">Cancel</button>
        <button onclick="saveCard()" class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
      </div>
    </div>
  </div>

  <script>
    let currentData = [];
    let currentType = 'powers';
    let currentCardName = '';

    async function loadData() {
      currentType = document.getElementById('compendiumSelect').value;
      const res = await fetch(`http://localhost:3001/api/${currentType}`);
      currentData = await res.json();
      const container = document.getElementById('cardContainer');
      container.innerHTML = currentData.map((c, i) => `
        <div class="bg-white p-4 shadow rounded cursor-pointer hover:bg-blue-50" onclick="openModal(${i})">
          <h3 class="font-bold">${c.name || c.Name || c.NAME}</h3>
        </div>
      `).join('');
    }

    function openModal(index) {
      const card = currentData[index];
      currentCardName = card.name || card.Name || card.NAME;
      document.getElementById('modalTitle').innerText = 'Edit ' + currentCardName;
      
      // Handle different data structures
      const desc = card.system ? (card.system.description || card.system.notes) : (card.Description || card.description || '');
      const mech = card.system ? (card.system.effects || card.system.mechanics) : (card.Mechanics || card.mechanics || '');
      
      document.getElementById('editDesc').value = desc || '';
      document.getElementById('editMech').value = mech || '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function saveCard() {
      // Determine if we are using the new db-backed endpoints
      const useNewApi = ['powers', 'advantages', 'flaws', 'extras'].includes(currentType);
      const url = useNewApi 
        ? `http://localhost:3001/api/${currentType}/${currentCardName}`
        : `http://localhost:3001/api/items/${currentType}/${currentCardName}`;
        
      await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          description: document.getElementById('editDesc').value,
          mechanics: document.getElementById('editMech').value 
        })
      });
      closeModal();
      loadData();
    }

    document.getElementById('compendiumSelect').addEventListener('change', loadData);
    loadData();
  </script>
</body>
</html>
